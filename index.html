{% extends "base.html" %}

{% block title %}My To-Do List{% endblock %}

{% block content %}
    <h1>📝 My To-Do List</h1>

    <form action="{{ url_for('add_task') }}" method="POST" class="add-form">
        <input type="text" name="title" placeholder="Add a new task..." autofocus>
        <button type="submit">Add</button>
    </form>

    {% if tasks %}
        <ul class="task-list">
            {% for task in tasks %}
                <li class="{% if task.done %}done{% endif %}">
                    <a href="{{ url_for('toggle_task', task_id=task.id) }}" class="title">
                        {{ task.title }}
                    </a>
                    <a href="{{ url_for('delete_task', task_id=task.id) }}" class="delete">✕</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="empty">No tasks yet. Add one above! 🎉</p>
    {% endif %}
{% endblock %}
